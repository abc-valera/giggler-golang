# https://taskfile.dev

version: "3"

tasks:
  run:local:
    dotenv: ["env/dev.env"]
    cmd: go tool air -c ./.config/air.toml

  run:dockerimage:
    cmd: docker run --rm --env-file env/dev.env -it giggler-golang

  build:dockerimage:
    cmd: docker build -t giggler-golang -f docker/Dockerfile .

  serve_docs:
    cmd: go run external/openapi/main.go

  generate:gorm:
    cmd: go tool gentool
      -db sqlite
      -tables ""
      -dsn ./var/db.sqlite3
      -outPath ./gen/gorm/gormQuery
      -modelPkgName ./gen/gorm/gormModel

  generate:bundle-openapi:
    cmd: npx redocly bundle
      -o ./external/openapi/bundle.yaml
      ./external/openapi/src/openapi.yaml

  generate:k6:
    cmd: npx openapi-to-k6 -v --include-sample-script external/openapi/bundle.yaml test/

  generate:view:
    cmd: go tool ogen
      --package view
      --target ./gen/view
      --clean ./external/openapi/bundle.yaml

  var:sqlite:
    env:
      SQLITE_PATH: ./var/db.sqlite3
      MIGRATIONS_PATH: ./external/sqlite/migrations.sql
    cmd: go run ./external/sqlite/sqlite.go

  var:clear:
    cmd: rm -r var/*
