  /auth/refresh:
    $ref: ../features/auth/path_auth_refresh.yaml
  /user:
    $ref: ../features/user/path_user.yaml
  /user/jokes:
    $ref: ../features/user/path_user_jokes.yaml
  /jokes:
    $ref: ../features/joke/path_jokes.yaml
